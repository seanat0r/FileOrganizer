<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Aufräumender Pinguin</title>
  <desc>Ein niedlicher Pinguin der mit einem Besen kehrt</desc>

  <style>
    .bg { fill: #e8f4f8; }
    .body { fill: #1a1a2e; }
    .belly { fill: #f5f0e8; }
    .beak { fill: #f4a535; }
    .eye-white { fill: #ffffff; }
    .eye-pupil { fill: #1a1a2e; }
    .eye-shine { fill: #ffffff; }
    .wing { fill: #1a1a2e; }
    .foot { fill: #f4a535; }
    .cheek { fill: #ffb3c6; opacity: 0.6; }
    .broom-stick { fill: none; stroke: #8B4513; stroke-width: 5; stroke-linecap: round; }
    .broom-head { fill: #D4A05A; }
    .broom-bristle { fill: none; stroke: #8B5E3C; stroke-width: 2.5; stroke-linecap: round; }
    .broom-band { fill: #c0832a; }
    .dust { fill: none; stroke: #b0b0b0; stroke-width: 1.5; stroke-linecap: round; opacity: 0.7; }
    .star { fill: #f4a535; opacity: 0.8; }
    .floor { fill: #d0e8d0; }
    .shadow { fill: #000; opacity: 0.07; }
  </style>

  <!-- Hintergrund -->
  <rect class="bg" x="0" y="0" width="680" height="680" rx="60"/>

  <!-- Boden -->
  <ellipse cx="340" cy="590" rx="210" ry="22" class="shadow"/>
  <rect class="floor" x="100" y="572" width="480" height="28" rx="14"/>

  <!-- Staubwolken -->
  <path class="dust" d="M155 560 Q148 548 158 540"/>
  <path class="dust" d="M175 565 Q165 550 178 543"/>
  <path class="dust" d="M135 555 Q130 543 140 535"/>
  <path class="dust" d="M195 558 Q190 545 200 538"/>

  <!-- Kleine Staubpartikel -->
  <circle cx="150" cy="536" r="3" fill="#c0c0c0" opacity="0.5"/>
  <circle cx="168" cy="530" r="2" fill="#b0b0b0" opacity="0.4"/>
  <circle cx="140" cy="525" r="2.5" fill="#c5c5c5" opacity="0.5"/>
  <circle cx="185" cy="533" r="2" fill="#b5b5b5" opacity="0.4"/>

  <!-- Besen (hinter Pinguin, links) -->
  <line class="broom-stick" x1="390" y1="340" x2="185" y2="570"/>
  <ellipse cx="173" cy="565" rx="42" ry="12" class="broom-head" transform="rotate(-35 173 565)"/>
  <line class="broom-bristle" x1="145" y1="572" x2="140" y2="590"/>
  <line class="broom-bristle" x1="155" y1="577" x2="151" y2="595"/>
  <line class="broom-bristle" x1="165" y1="580" x2="162" y2="597"/>
  <line class="broom-bristle" x1="175" y1="579" x2="174" y2="596"/>
  <line class="broom-bristle" x1="185" y1="576" x2="186" y2="592"/>
  <line class="broom-bristle" x1="195" y1="570" x2="198" y2="586"/>
  <line x1="150" y1="572" x2="200" y2="560" stroke="#c0832a" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- PINGUIN KÖRPER -->
  <ellipse cx="360" cy="450" rx="95" ry="130" class="body"/>
  <ellipse cx="360" cy="460" rx="58" ry="90" class="belly"/>

  <!-- Linke Flosse (hält Besen) -->
  <ellipse cx="272" cy="420" rx="30" ry="65" class="wing" transform="rotate(-40 272 420)"/>

  <!-- Rechte Flosse -->
  <ellipse cx="447" cy="435" rx="28" ry="62" class="wing" transform="rotate(15 447 435)"/>

  <!-- Kopf -->
  <ellipse cx="360" cy="310" rx="78" ry="82" class="body"/>

  <!-- Wangen -->
  <ellipse cx="318" cy="320" rx="18" ry="14" class="cheek"/>
  <ellipse cx="402" cy="320" rx="18" ry="14" class="cheek"/>

  <!-- Augen -->
  <ellipse cx="337" cy="296" rx="16" ry="17" class="eye-white"/>
  <ellipse cx="383" cy="296" rx="16" ry="17" class="eye-white"/>
  <circle cx="339" cy="300" r="9" class="eye-pupil"/>
  <circle cx="381" cy="300" r="9" class="eye-pupil"/>
  <circle cx="335" cy="296" r="3.5" class="eye-shine"/>
  <circle cx="377" cy="296" r="3.5" class="eye-shine"/>

  <!-- Schnabel -->
  <ellipse cx="360" cy="328" rx="22" ry="12" class="beak"/>
  <line x1="340" y1="328" x2="380" y2="328" stroke="#d4921a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Schweissperle -->
  <ellipse cx="414" cy="272" rx="7" ry="11" fill="#7ec8e3" opacity="0.85" transform="rotate(15 414 272)"/>
  <ellipse cx="414" cy="268" rx="3.5" ry="3" fill="#a8dff0" opacity="0.6"/>

  <!-- Füße -->
  <ellipse cx="330" cy="574" rx="32" ry="14" class="foot" transform="rotate(-8 330 574)"/>
  <ellipse cx="392" cy="574" rx="32" ry="14" class="foot" transform="rotate(8 392 574)"/>
  <line x1="310" y1="572" x2="304" y2="583" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="325" y1="576" x2="322" y2="587" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="340" y1="578" x2="339" y2="589" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="372" y1="578" x2="372" y2="589" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="387" y1="577" x2="389" y2="588" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="402" y1="574" x2="407" y2="585" stroke="#c8891a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Sternchen -->
  <g transform="translate(490 220)">
    <polygon points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4" fill="#f4a535" opacity="0.85"/>
  </g>
  <g transform="translate(510 255) scale(0.65)">
    <polygon points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4" fill="#f4c535" opacity="0.7"/>
  </g>
  <g transform="translate(475 250) scale(0.5)">
    <polygon points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4" fill="#f4a535" opacity="0.6"/>
  </g>
</svg>
